<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> KASUGAI CROW </title>
    
    <!-- Google Fonts - Noto Serif JP for Japanese-inspired typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Hero Section -->
    <section class="hero-section">
        <div class="hero-background">
            <!-- Subtle decorative elements -->
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
            <div class="mountain mountain-1"></div>
            <div class="mountain mountain-2"></div>
            <div class="wisteria wisteria-1"></div>
            <div class="wisteria wisteria-2"></div>
            <div class="checkered-pattern"></div>
        </div>
        <div class="hero-content">
            <h1 class="hero-title">KASUGAI CROW</h1>
            <p class="hero-subtitle">AI vision desktop assistant</p>
            <div class="hero-quote">
                <p class="quote-text">Deliver. Guide. Protect.</p>
                 <p class="quote-japanese">届けよ。導け。守れ。</p>
            </div>
        </div>
    </section>

   
   
        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Chat Interface -->
            <div class="chat-container">
                <!-- Chat Header -->
                <div class="chat-header">
                    <div class="chat-header-content">
                        <div class="crow-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-9c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm4 0c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm-2 5c-1.66 0-3-1.34-3-3h6c0 1.66-1.34 3-3 3z"/>
                            </svg>
                        </div>
                        <h2 class="chat-title">Kasugai Crow</h2>
                    </div>
                </div>

                <!-- Chat Messages -->
                <div class="chat-messages" id="chatMessages">
                    <!-- Welcome Message -->
                    <div class="message assistant-message">
                        <div class="message-avatar">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 4c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm4 0c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm-2 6c-1.66 0-3-1.34-3-3h6c0 1.66-1.34 3-3 3z"/>
                            </svg>
                        </div>
                        <div class="message-content">
                            <p class="message-sender">Kasugai Crow</p>
                            <p class="message-text">Greetings. I am the Kasugai Crow, your AI assistant. How may I assist you today?</p>
                        </div>
                    </div>
                </div>

                <!-- Input Area -->
                <div class="chat-input-container">
                    <!-- File Preview -->
                    <div class="file-preview" id="filePreview" style="display: none;">
                        <span class="file-name" id="fileName"></span>
                        <button class="remove-file" id="removeFile">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="18" y1="6" x2="6" y2="18"></line>
                                <line x1="6" y1="6" x2="18" y2="18"></line>
                            </svg>
                        </button>
                    </div>
                    
                    <!-- Integrated Message Bar -->
                    <div class="message-bar">
                        <!-- Upload Image Button -->
                        <button id="uploadImageButton" class="icon-button" title="Upload Image">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path>
                            </svg>
                        </button>
                        
                        <!-- Capture Screen Button -->
                        <button id="captureButton" class="icon-button" title="Capture & Analyze Screen">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"></path>
                                <circle cx="12" cy="13" r="4"></circle>
                            </svg>
                        </button>
                        
                        <!-- Text Input -->
                        <input 
                            type="text" 
                            id="messageInput" 
                            class="message-input" 
                            placeholder="Ask the Kasugai Network..."
                            autocomplete="off"
                        >
                        
                        <!-- Send Button -->
                        <button id="sendButton" class="send-button" disabled>
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                            </svg>
                        </button>
                    </div>
                    
                    <!-- Clear Chat Button (separate, below) -->
                    <button id="clearChatButton" class="clear-chat-button">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                        </svg>
                        Clear Chat
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-crow">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-2-9c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm4 0c-.55 0-1 .45-1 1s.45 1 1 1 1-.45 1-1-.45-1-1-1zm-2 5c-1.66 0-3-1.34-3-3h6c0 1.66-1.34 3-3 3z"/>
            </svg>
        </div>
        <p class="loading-text">The Kasugai Crow is gathering information...</p>
    </div>

    <!-- Notification Container -->
    <div class="notification-container" id="notificationContainer"></div>

    <!-- Hidden file input for image upload -->
    <input type="file" id="imageUpload" accept="image/*" style="display: none;">

    <!-- Custom JavaScript -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
